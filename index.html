<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CodGoli crea experiencias digitales y soluciones web a medida."
    />
    <title>CodGoli — Próximamente</title>

    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f7ff;
        --muted: #c7c4d5;
        --violet: #7c3aed;
        --blue: #37b7ff;
        --bg: #090713;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.35), transparent 32rem),
          radial-gradient(circle at 82% 75%, rgba(55, 183, 255, 0.2), transparent 30rem),
          var(--bg);
      }

      .orb {
        position: absolute;
        width: 22rem;
        height: 22rem;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 50%;
        filter: blur(0.2px);
        animation: float 8s ease-in-out infinite;
      }

      .orb::after {
        content: "";
        position: absolute;
        inset: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: inherit;
      }

      .orb-one {
        top: -12rem;
        right: -8rem;
      }

      .orb-two {
        bottom: -15rem;
        left: -8rem;
        animation-delay: -4s;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(90%, 760px);
        padding: 3rem 1.5rem;
        text-align: center;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 3rem;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .mark {
        width: 2rem;
        height: 2rem;
        display: grid;
        place-items: center;
        border-radius: 0.65rem;
        color: white;
        font-size: 1.1rem;
        background: linear-gradient(135deg, var(--violet), var(--blue));
        box-shadow: 0 0 28px rgba(124, 58, 237, 0.55);
      }

      .tag {
        display: inline-block;
        padding: 0.45rem 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        color: #dcd7ff;
        font-size: 0.8rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 700px;
        margin: 1.35rem auto 1rem;
        font-size: clamp(3rem, 9vw, 6.5rem);
        line-height: 0.94;
        letter-spacing: -0.075em;
      }

      h1 span {
        background: linear-gradient(100deg, #fff 20%, #c8a7ff 55%, #69d4ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        max-width: 540px;
        margin: 0 auto;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.65;
      }

      .line {
        width: 5rem;
        height: 0.25rem;
        margin: 2rem auto;
        border-radius: 1rem;
        background: linear-gradient(90deg, var(--violet), var(--blue));
      }

      a {
        display: inline-block;
        padding: 0.9rem 1.15rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.8rem;
        color: var(--ink);
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, background 0.2s ease;
      }

      a:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.1);
      }

      footer {
        margin-top: 3.2rem;
        color: rgba(255, 255, 255, 0.48);
        font-size: 0.85rem;
      }

      @keyframes float {
        50% {
          transform: translateY(1.4rem) rotate(8deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="orb orb-one"></div>
    <div class="orb orb-two"></div>

    <main>
      <div class="logo">
        <span class="mark">&lt;/&gt;</span>
        <span>CodGoli</span>
      </div>

      <span class="tag">Estamos construyendo algo grande</span>

      <h1>Lo digital también puede ser una <span>aventura.</span></h1>

      <p>
        En CodGoli diseñamos experiencias digitales atractivas y soluciones web
        creadas alrededor de las necesidades reales de cada negocio.
      </p>

      <div class="line"></div>

      <a href="mailto:hola@codgoli.com">Próximamente</a>

      <footer>© 2026 CodGoli. Mérida, México.</footer>
    </main>
  </body>
</html>
